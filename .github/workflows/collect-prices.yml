name: Collect Fuel Prices

on:
  schedule:
    # Backup: 10:45 AM EET (UTC+3) on weekdays, in case pg_cron fails
    - cron: '45 7 * * 1-5'
  workflow_dispatch:
    # Triggered by Supabase pg_cron at exactly 10:30 AM EET, or manually

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect fuel prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/collect_prices.py
